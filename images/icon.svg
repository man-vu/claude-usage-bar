<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1a1a2e" stroke="#e07a5f" stroke-width="3"/>

  <!-- Usage bar background -->
  <rect x="24" y="52" width="80" height="24" rx="4" ry="4" fill="#2d2d44"/>

  <!-- Usage bar fill (gradient) -->
  <defs>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="60%" style="stop-color:#facc15"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>
  <rect x="27" y="55" width="56" height="18" rx="2" ry="2" fill="url(#barGrad)"/>

  <!-- Bar segments (dividers) -->
  <line x1="35" y1="52" x2="35" y2="76" stroke="#1a1a2e" stroke-width="1" opacity="0.3"/>
  <line x1="43" y1="52" x2="43" y2="76" stroke="#1a1a2e" stroke-width="1" opacity="0.3"/>
  <line x1="51" y1="52" x2="51" y2="76" stroke="#1a1a2e" stroke-width="1" opacity="0.3"/>
  <line x1="59" y1="52" x2="59" y2="76" stroke="#1a1a2e" stroke-width="1" opacity="0.3"/>
  <line x1="67" y1="52" x2="67" y2="76" stroke="#1a1a2e" stroke-width="1" opacity="0.3"/>
  <line x1="75" y1="52" x2="75" y2="76" stroke="#1a1a2e" stroke-width="1" opacity="0.3"/>
  <line x1="83" y1="52" x2="83" y2="76" stroke="#1a1a2e" stroke-width="1" opacity="0.3"/>
  <line x1="91" y1="52" x2="91" y2="76" stroke="#1a1a2e" stroke-width="1" opacity="0.3"/>

  <!-- Percentage text -->
  <text x="64" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e8e8e8">72%</text>

  <!-- "Claude" label -->
  <text x="64" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#a0a0b8">USAGE</text>
</svg>
